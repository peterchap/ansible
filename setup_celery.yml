---
- name: Set up Celery on slave servers
  hosts: slaves
  become: yes

  vars:
    project_dir: /root/celery_app
    venv_dir: "{{ project_dir }}/venv"
    master_rabbitmq_ip: "10.0.0.3"
    master_redis_ip: "10.0.0.3"
    input_folder: "/mnt/shared/subfiles"
    processed_folder: "/mnt/shared/processed"

  tasks:
    - name: Delete content & directory
      ansible.builtin.file:
        state: absent
        path: "{{ project_dir }}"

    - name: Install Python3 and pip3
      ansible.builtin.apt:
        name: 
          - python3.12
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes

    - name: Create project directory
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Create virtual environment
      ansible.builtin.command: python3.12 -m venv {{ venv_dir }}
      args:
        creates: "{{ venv_dir }}"

    - name: Install Celery and Redis client for Python
      ansible.builtin.pip:
        name: 
          - celery[redis]
        virtualenv: "{{ venv_dir }}"

    - name: Create celery_app.py file in project directory
      ansible.builtin.copy:
        dest: "{{ project_dir }}/celery_app.py"
        content: |
          from celery import Celery
          app = Celery('file_processor',
                      broker='pyamqp://rabbit:1Francis2@{{ master_rabbitmq_ip }}//',
                      backend='redis://{{ master_redis_ip }}')
          app.conf.task_routes = {'task.process_file': {'queue': 'file_queue'}}
          app.conf.broker_connection_retry_on_startup = True
          import task
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Create task.py file in project directory
      ansible.builtin.copy:
        dest: "{{ project_dir }}/task.py"
        content: |
          from celery_app import app
          @app.task
          def process_file(file_path):
              return f"Processing file at path: {file_path}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Create Celery systemd service file for worker
      ansible.builtin.copy:
        dest: /etc/systemd/system/celery_worker.service
        content: |
          [Unit]
          Description=Celery Worker
          After=network.target
          [Service]
          User={{ ansible_user }}
          Group={{ ansible_user }}
          WorkingDirectory={{ project_dir }}
          ExecStart={{ venv_dir }}/bin/celery -A celery_app worker --loglevel=info -Q file_queue
          Restart=always
          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Reload systemd to apply the new service
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable and start the Celery worker service
      ansible.builtin.systemd:
        name: celery_worker
        enabled: yes
        state: started
